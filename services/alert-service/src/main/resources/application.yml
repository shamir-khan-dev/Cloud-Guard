server:
  port: 8082

spring:
  application:
    name: alert-service
  
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: alert-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME:demo@gmail.com}
    password: ${SMTP_PASSWORD:secret}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  slack:
    webhookUrl: ${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/mock/webhook/123}
  alerts:
    emailRecipient: ${ALERT_EMAIL_RECIPIENT:admin@cloudguard.io}
