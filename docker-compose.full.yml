version: '3.8'

services:
  # --- INFRASTRUCTURE BUS & DATABASES ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cloudguard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cloudguard-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cloudguard-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - cloudguard-network

  postgres:
    image: postgres:15-alpine
    container_name: cloudguard-postgres
    environment:
      POSTGRES_USER: cloudguard_user
      POSTGRES_PASSWORD: cloudguard_password
      POSTGRES_DB: cloudguard_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - cloudguard-network

  redis:
    image: redis:7-alpine
    container_name: cloudguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - cloudguard-network

  # --- POLYGLOT MICROSERVICES ---
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: cloudguard-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cloudguard_db
      SPRING_DATASOURCE_USERNAME: cloudguard_user
      SPRING_DATASOURCE_PASSWORD: cloudguard_password
      SPRING_REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    networks:
      - cloudguard-network

  metrics-collector:
    build:
      context: ./services/metrics-collector
      dockerfile: Dockerfile
    container_name: cloudguard-metrics-collector
    environment:
      KAFKA_BROKER: kafka:29092
    depends_on:
      - kafka
    networks:
      - cloudguard-network

  analytics-engine:
    build:
      context: ./services/analytics-engine
      dockerfile: Dockerfile
    container_name: cloudguard-analytics-engine
    environment:
      KAFKA_BROKER: kafka:29092
      POSTGRES_URL: jdbc:postgresql://postgres:5432/cloudguard_db
    depends_on:
      - kafka
      - postgres
    networks:
      - cloudguard-network

  anomaly-detector:
    build:
      context: ./services/anomaly-detector
      dockerfile: Dockerfile
    container_name: cloudguard-anomaly-detector
    ports:
      - "8000:8000"
    environment:
      KAFKA_BROKER: kafka:29092
    depends_on:
      - kafka
    networks:
      - cloudguard-network

  alert-service:
    build:
      context: ./services/alert-service
      dockerfile: Dockerfile
    container_name: cloudguard-alert-service
    environment:
      KAFKA_BROKER: kafka:29092
    depends_on:
      - kafka
    networks:
      - cloudguard-network

  # --- FRONTEND DASHBOARD ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudguard-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - api-gateway
    networks:
      - cloudguard-network

volumes:
  pgdata:
  redisdata:

networks:
  cloudguard-network:
    name: cloudguard-network
    driver: bridge
