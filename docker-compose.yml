version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cloudguard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cloudguard-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cloudguard-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - cloudguard-network

  postgres:
    image: postgres:15-alpine
    container_name: cloudguard-postgres
    environment:
      POSTGRES_USER: cloudguard_user
      POSTGRES_PASSWORD: cloudguard_password
      POSTGRES_DB: cloudguard_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - cloudguard-network

  redis:
    image: redis:7-alpine
    container_name: cloudguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - cloudguard-network

volumes:
  pgdata:
  redisdata:

networks:
  cloudguard-network:
    name: cloudguard-network
    driver: bridge
